services:
  event-stream-filter:
    build: 
      dockerfile: Dockerfile.dev
    command:
      pnpm run start
    ports:
      - 8300:8300
      - 8350:8350
    volumes:
      - .:/app/
      - event-stream-filter-node-modules:/app/node_modules
    restart: always
    environment:
      - ENV_ID=dev
      - LOG_LEVEL=info

volumes:
  event-stream-filter-node-modules:
